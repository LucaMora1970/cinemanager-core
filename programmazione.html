<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programmazione — Cinema Multisala Teatro Mendrisio</title>
<meta name="description" content="Programmazione settimanale del Cinema Multisala Teatro Mendrisio e Cinetour.ch Open Air">
<style>
  :root{
    --acc:#f0801a;--bg:#faf9f7;--surf:#ffffff;--txt:#1a1a1a;--txt2:#6b6b6b;--bdr:#e5e2dc;
    --sala1:#4a9ee8;--sala2:#e89a3a;--sala3:#3ae8aa;--sala4:#c84ae8;--oa:#0d5c8a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);line-height:1.5;padding:0 0 60px;}
  header{background:var(--surf);border-bottom:3px solid var(--acc);padding:28px 20px 22px;text-align:center;}
  header h1{font-size:22px;font-weight:800;letter-spacing:-.2px;}
  header .sub{font-size:14px;color:var(--txt2);margin-top:3px;font-weight:500;}
  header .period{display:inline-block;margin-top:14px;background:var(--acc);color:#fff;font-size:13px;font-weight:700;padding:7px 20px;border-radius:20px;letter-spacing:.2px;}
  main{max-width:780px;margin:0 auto;padding:28px 16px;}
  .elaborazione{
    text-align:center;padding:50px 24px;
    background:var(--surf);border:1px solid var(--bdr);border-radius:12px;
    margin-top:10px;
  }
  .elaborazione .icon{font-size:40px;margin-bottom:14px;}
  .elaborazione .it{font-size:18px;font-weight:700;color:var(--txt);margin-bottom:6px;}
  .elaborazione .en{font-size:14px;color:var(--txt2);margin-bottom:3px;}
  .elaborazione .de{font-size:14px;color:var(--txt2);margin-bottom:3px;}
  .elaborazione .fr{font-size:14px;color:var(--txt2);}
  .section-title{font-size:12px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--txt2);margin:32px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--bdr);display:flex;align-items:center;gap:7px;}
  .section-title:first-child{margin-top:0;}
  .film-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .film-card.oa{border-left:4px solid var(--oa);}
  .film-title{font-size:17px;font-weight:800;margin-bottom:3px;}
  .film-meta{font-size:12px;color:var(--txt2);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .ver-badge{background:var(--bg);border:1px solid var(--bdr);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;color:var(--txt);}
  .days-list{display:flex;flex-direction:column;gap:8px;}
  .day-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);border-radius:8px;}
  .day-label{font-size:12px;font-weight:700;min-width:80px;color:var(--txt2);}
  .times-wrap{display:flex;flex-wrap:wrap;gap:6px;}
  .time-pill{background:var(--surf);border:1px solid var(--bdr);border-radius:6px;padding:4px 10px;font-size:13px;font-weight:700;color:var(--acc);}
  .sala-chip{font-size:11px;color:var(--txt2);display:flex;align-items:center;gap:4px;}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .loc-chip{font-size:12px;color:var(--oa);font-weight:600;}
  .empty-msg{text-align:center;color:var(--txt2);font-size:14px;padding:50px 20px;}
  footer{max-width:780px;margin:40px auto 0;padding:24px 16px 0;border-top:1px solid var(--bdr);text-align:center;color:var(--txt2);font-size:12px;}
  footer .org{font-weight:700;color:var(--txt);font-size:13px;margin-bottom:5px;}
  footer a{color:var(--acc);text-decoration:none;}
  footer a:hover{text-decoration:underline;}
  footer .links{margin-top:10px;display:flex;flex-direction:column;gap:3px;}
  .print-btn{position:fixed;bottom:22px;right:22px;background:var(--acc);color:#fff;border:none;border-radius:30px;padding:13px 22px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(240,128,26,.35);}
  .loading{text-align:center;padding:80px 20px;color:var(--txt2);}
  .spinner{width:34px;height:34px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .updated-note{font-size:11px;color:var(--txt2);margin-top:8px;}
  @media print{body{background:#fff;}.print-btn{display:none;}.film-card,.section-title{break-inside:avoid;}header{border-bottom:2px solid #000;}}
  @media(max-width:480px){header h1{font-size:18px;}.film-title{font-size:15px;}.day-label{min-width:60px;}}
</style>
</head>
<body>

<header>
  <h1 id="hdr-title">Cinema Multisala Teatro Mendrisio</h1>
  <div class="sub" id="hdr-sub" style="display:none">& Cinetour Open Air</div>
  <div class="period" id="period" style="display:none"></div>
</header>

<main id="main">
  <div class="loading"><div class="spinner"></div>Caricamento in corso...</div>
</main>

<footer id="footer" style="display:none">
  <div class="org">Fabbrica dei Sogni Sagl</div>
  <div>Via Vincenzo Vela 21</div>
  <div>6850 Mendrisio — Tel. 091 646 16 54</div>
  <div class="links">
    <a href="https://www.mendrisiocinema.ch" target="_blank" rel="noopener">www.mendrisiocinema.ch</a>
    <a href="https://www.cinetour.ch" target="_blank" rel="noopener">www.cinetour.ch</a>
    <a href="https://www.cinema-ambulante.com" target="_blank" rel="noopener">www.cinema-ambulante.com</a>
  </div>
  <div class="updated-note" id="updated-note"></div>
</footer>

<button class="print-btn" onclick="window.print()">🖨 Stampa</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCYM1tZsUI-pz3D0J6EWEMqyDxrk9hep1o",
  authDomain:"cinemanager-4c67c.firebaseapp.com",
  projectId:"cinemanager-4c67c",
  storageBucket:"cinemanager-4c67c.firebasestorage.app",
  messagingSenderId:"730874662111",
  appId:"1:730874662111:web:8a4a501dd81644bc96ed6a"
};

const SALE={'1':{nome:'Teatro',col:'var(--sala1)'},'2':{nome:'Ciak',col:'var(--sala2)'},'3':{nome:'1908',col:'var(--sala3)'},'4':{nome:'Mignon',col:'var(--sala4)'}};
const DITB=['Gio','Ven','Sab','Dom','Lun','Mar','Mer'];

// Settimana cinematografica: Gio/Ven/Sab/Dom → giovedì corrente; Lun/Mar/Mer → giovedì prossimo
function cinemaWeekStart(){const today=new Date();today.setHours(0,0,0,0);const dow=today.getDay();const offsets={0:-3,1:3,2:2,3:1,4:0,5:-1,6:-2};const d=new Date(today);d.setDate(d.getDate()+offsets[dow]);return d;}
function wdays(ws){return Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return d;});}
function wdates(ws){return wdays(ws).map(d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);}
function fd(d){return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fs(d){return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const ws=cinemaWeekStart();
const days=wdays(ws);
const wd=wdates(ws);
let programmaData=null;

// Carica dati film/shows/bookings una volta sola
async function fetchData(){
  const [filmsSnap,showsSnap,bookingsSnap]=await Promise.all([
    getDocs(collection(db,'films')),
    getDocs(collection(db,'shows')),
    getDocs(collection(db,'bookings'))
  ]);
  const films=filmsSnap.docs.map(d=>({id:d.id,...d.data()}));
  const shows=showsSnap.docs.map(d=>({id:d.id,...d.data()})).filter(s=>wd.includes(s.day));
  const oaBookings=bookingsSnap.docs.map(d=>({id:d.id,...d.data()})).filter(b=>b.type==='openair'&&(b.dates||[]).some(d=>wd.includes(d.date)));
  programmaData={films,shows,oaBookings};
  return programmaData;
}

function showElaborazione(){
  document.getElementById('period').style.display='none';
  document.getElementById('hdr-sub').style.display='none';
  document.getElementById('footer').style.display='none';
  document.getElementById('main').innerHTML=`
    <div class="elaborazione">
      <div class="icon">🎬</div>
      <div class="it">Programmazione settimanale in elaborazione</div>
      <div class="en">Prog to be published</div>
      <div class="de">Prog noch nicht verfügbar</div>
      <div class="fr">Prog pas encore disponible</div>
    </div>`;
}

function showProgramma(data){
  const {films,shows,oaBookings}=data;
  const hasOA=oaBookings.length>0;

  // Header
  document.getElementById('hdr-sub').style.display=hasOA?'block':'none';
  const periodEl=document.getElementById('period');
  periodEl.textContent='Dal '+fd(days[0])+' al '+fd(days[6]);
  periodEl.style.display='inline-block';

  let html='';

  // ── Multisala ──────────────────────────────────────────────────
  const fids=[];shows.forEach(s=>{if(fids.indexOf(s.filmId)<0)fids.push(s.filmId);});
  const filmsInWeek=fids.map(id=>films.find(f=>f.id===id)).filter(Boolean)
    .sort((a,b)=>(b.release||'').localeCompare(a.release||''));

  if(filmsInWeek.length){
    html+='<div class="section-title">🎬 Cinema Multisala Teatro Mendrisio</div>';
    filmsInWeek.forEach(film=>{
      const fs2=shows.filter(s=>s.filmId===film.id);
      if(!fs2.length)return;
      const dur=film.duration?(Math.floor(film.duration/60)+'h'+String(film.duration%60).padStart(2,'0')):'';
      // Raggruppa per giorno
      const byDay={};
      fs2.forEach(s=>{
        if(!byDay[s.day])byDay[s.day]=[];
        byDay[s.day].push(s);
      });
      html+=`<div class="film-card">`;
      html+=`<div class="film-title">${esc(film.title)}</div>`;
      html+=`<div class="film-meta">${dur?`<span>${dur}</span>`:''}${film.version?`<span class="ver-badge">${esc(film.version)}</span>`:''}</div>`;
      html+=`<div class="days-list">`;
      Object.keys(byDay).sort().forEach(ds=>{
        const di=wd.indexOf(ds);
        const dayLbl=di>=0?DITB[di]+' '+fs(days[di]):ds;
        const saleGruppo={};
        byDay[ds].forEach(s=>{
          if(!saleGruppo[s.sala])saleGruppo[s.sala]=[];
          saleGruppo[s.sala].push(s.start);
        });
        html+=`<div class="day-row"><span class="day-label">${dayLbl}</span><div class="times-wrap">`;
        Object.keys(saleGruppo).sort().forEach(sala=>{
          const salaInfo=SALE[sala]||{nome:sala,col:'#999'};
          saleGruppo[sala].sort().forEach(t=>{
            html+=`<span class="time-pill">${t}</span>`;
          });
          html+=`<span class="sala-chip"><span class="dot" style="background:${salaInfo.col}"></span>${esc(salaInfo.nome)}</span>`;
        });
        html+=`</div></div>`;
      });
      html+=`</div></div>`;
    });
  }

  // ── Cinetour Open Air ──────────────────────────────────────────
  if(hasOA){
    const oaByFilm={};
    oaBookings.forEach(b=>{
      const film=b.filmId?films.find(f=>f.id===b.filmId):null;
      const ft=b.oaFilmTitle||(film?film.title:'')||b.name||'Film Cinetour';
      if(!oaByFilm[ft])oaByFilm[ft]={dur:film?film.duration:0,ver:b.oaVersione||(film?film.version:'')||'',dates:[]};
      (b.dates||[]).filter(d=>wd.includes(d.date)).forEach(d=>{
        oaByFilm[ft].dates.push({date:d.date,start:d.start||b.start||'',loc:b.location||b.oaLocation||''});
      });
    });
    const oaKeys=Object.keys(oaByFilm).filter(k=>oaByFilm[k].dates.length)
      .sort((a,b)=>{
        const da=(oaByFilm[a].dates.slice().sort((x,y)=>x.date.localeCompare(y.date))[0]||{}).date||'';
        const db_=(oaByFilm[b].dates.slice().sort((x,y)=>x.date.localeCompare(y.date))[0]||{}).date||'';
        return da.localeCompare(db_);
      });
    if(oaKeys.length){
      html+='<div class="section-title">🌙 Cinetour.ch Open Air</div>';
      oaKeys.forEach(ft=>{
        const info=oaByFilm[ft];
        const dur=info.dur?(Math.floor(info.dur/60)+'h'+String(info.dur%60).padStart(2,'0')):'';
        // Raggruppa per giorno
        const byDay={};
        info.dates.forEach(d=>{if(!byDay[d.date])byDay[d.date]=[];byDay[d.date].push(d);});
        html+=`<div class="film-card oa">`;
        html+=`<div class="film-title">${esc(ft)}</div>`;
        html+=`<div class="film-meta">${dur?`<span>${dur}</span>`:''}${info.ver?`<span class="ver-badge">${esc(info.ver)}</span>`:''}</div>`;
        html+=`<div class="days-list">`;
        Object.keys(byDay).sort().forEach(ds=>{
          const di=wd.indexOf(ds);
          const dt2=new Date(ds+'T12:00:00');
          const dayLbl=di>=0?DITB[di]+' '+fs(days[di]):dt2.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});
          html+=`<div class="day-row"><span class="day-label">${dayLbl}</span><div class="times-wrap">`;
          byDay[ds].forEach(d=>{
            html+=`<span class="time-pill">${d.start||''}</span>`;
            if(d.loc)html+=`<span class="loc-chip">📍 ${esc(d.loc)}</span>`;
          });
          html+=`</div></div>`;
        });
        html+=`</div></div>`;
      });
    }
  }

  if(!html)html='<div class="empty-msg">Nessuna proiezione programmata per questa settimana.</div>';
  document.getElementById('main').innerHTML=html;
  document.getElementById('footer').style.display='block';
  document.getElementById('updated-note').textContent='Aggiornato il '+new Date().toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

// Listener live sul flag pubblicazione
async function init(){
  try{
    await fetchData();
  }catch(e){
    console.error('Fetch error',e);
    document.getElementById('main').innerHTML='<div class="empty-msg">⚠️ Impossibile caricare la programmazione. Riprova tra qualche minuto.</div>';
    return;
  }
  // Ascolta il flag in tempo reale
  onSnapshot(doc(db,'settings','pubFlag'),snap=>{
    const published=snap.exists()?snap.data().published||false:false;
    if(published){
      showProgramma(programmaData);
    }else{
      showElaborazione();
    }
  },err=>{
    console.error('Flag error',err);
    showElaborazione();
  });
}

init();
</script>
</body>
</html>
